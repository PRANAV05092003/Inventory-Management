# Render Blueprint — https://render.com/docs/blueprint-spec
# Deploy backend as a Docker web service; use Neon for PostgreSQL.

services:
  - type: web
    name: inventory-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: APP_NAME
        value: Inventory Management API
      - key: APP_VERSION
        value: 1.0.0
      - key: DEBUG
        value: false
      - key: WEB_CONCURRENCY
        value: 2
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: POSTGRES_DB
        sync: false
      - key: POSTGRES_USER
        sync: false
      - key: POSTGRES_PASSWORD
        sync: false
      - key: POSTGRES_HOST
        sync: false
      - key: POSTGRES_PORT
        value: 5432
